name: CI Optimized

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancelar runs duplicados
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '18'
  GO_VERSION: '1.23'
  PNPM_VERSION: '9.15.0'

jobs:
  # FASE 1: Setup e Detecção usando Nx 20
  setup:
    name: Setup & Detect Changes
    runs-on: ubuntu-latest
    outputs:
      affected-projects: ${{ steps.affected.outputs.affected-projects }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          go-version: ${{ env.GO_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Detect Affected Projects
        id: affected
        run: |
          echo "🔍 Detecting affected projects using Nx 20..."
          AFFECTED_PROJECTS=$(pnpm nx affected --target=build --base=${{ github.base_ref || 'HEAD~1' }} --plain)
          echo "affected-projects=$AFFECTED_PROJECTS" >> $GITHUB_OUTPUT
          echo "✅ Affected projects: $AFFECTED_PROJECTS"

  # FASE 2: Lint usando Nx 20
  lint:
    name: Lint All Projects
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          go-version: ${{ env.GO_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Lint Node.js Projects
        uses: ./.github/actions/node-validation
        with:
          strategy: 'affected'
          base-ref: ${{ github.base_ref || 'HEAD~1' }}

      - name: Lint Go Projects
        uses: ./.github/actions/go-validation
        with:
          strategy: 'affected'
          base-ref: ${{ github.base_ref || 'HEAD~1' }}

  # FASE 3: Test usando Nx 20
  test:
    name: Test All Projects
    runs-on: ubuntu-latest
    needs: [setup, lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          go-version: ${{ env.GO_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Test Node.js Projects
        run: |
          echo "🧪 Running Node.js tests with coverage..."
          pnpm nx affected --target=test --base=${{ github.base_ref || 'HEAD~1' }} --coverage
        shell: bash

      - name: Test Go Projects
        run: |
          echo "🧪 Running Go tests with coverage..."
          pnpm nx affected --target=test --base=${{ github.base_ref || 'HEAD~1' }} --coverage
        shell: bash

  # FASE 4: Build usando Nx 20
  build:
    name: Build All Projects
    runs-on: ubuntu-latest
    needs: [setup, lint, test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          go-version: ${{ env.GO_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Build Projects
        run: |
          echo "🔨 Building projects using Nx 20..."
          pnpm nx affected --target=build --base=${{ github.base_ref || 'HEAD~1' }}
        shell: bash

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # FASE 5: Summary usando Nx 20
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [setup, lint, test, build]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Workspace
        uses: ./.github/actions/setup-workspace
        with:
          node-version: ${{ env.NODE_VERSION }}
          go-version: ${{ env.GO_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

      - name: Generate Summary
        run: |
          echo "📊 CI Summary using Nx 20:"
          echo "  Affected Projects: ${{ needs.setup.outputs.affected-projects }}"
          echo ""
          echo "Job Results:"
          echo "  Setup: ${{ needs.setup.result }}"
          echo "  Lint: ${{ needs.lint.result }}"
          echo "  Test: ${{ needs.test.result }}"
          echo "  Build: ${{ needs.build.result }}"
          echo ""
          echo "✅ CI completed using Nx 20 patterns"
        shell: bash
