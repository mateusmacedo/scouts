name: 'Node.js Validation'
description: 'Validate Node.js code with ESLint, Biome format and tests'

inputs:
  strategy:
    description: 'Execution strategy (affected or all)'
    required: true
    default: 'affected'
  base-ref:
    description: 'Base reference for affected strategy'
    required: false
    default: 'origin/main'

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install pnpm
      run: |
        echo "📦 Installing pnpm..."
        npm install -g pnpm@9.15.0
        echo "pnpm-version=$(pnpm --version)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Install Dependencies
      run: |
        echo "📦 Installing dependencies..."
        pnpm install --frozen-lockfile
        echo "✅ Dependencies installed"
      shell: bash

    - name: Check Node.js projects exist
      run: |
        if [ ! -d "apps/bff-nest" ] && [ ! -d "apps/express-notifier" ] && [ ! -d "libs" ]; then
          echo "No Node.js projects found, skipping Node.js validation"
          exit 0
        fi
      shell: bash

    - name: ESLint
      run: |
        echo "🔍 Running ESLint..."
        if [ "${{ inputs.strategy }}" = "affected" ]; then
          # Verificar se a branch base existe antes de usar affected
          if git rev-parse --verify ${{ inputs.base-ref }} >/dev/null 2>&1; then
            pnpm nx affected --target=lint --base=${{ inputs.base-ref }}
          else
            echo "⚠️ Base branch ${{ inputs.base-ref }} not found, running all projects instead"
            pnpm nx run-many --target=lint --all
          fi
        else
          pnpm nx run-many --target=lint --all
        fi
        echo "✅ ESLint passed"
      shell: bash

    - name: Biome Check
      run: |
        echo "🔍 Running Biome check via Nx..."
        if [ "${{ inputs.strategy }}" = "affected" ]; then
          # Verificar se a branch base existe antes de usar affected
          if git rev-parse --verify ${{ inputs.base-ref }} >/dev/null 2>&1; then
            pnpm nx affected --target=biome-check --base=${{ inputs.base-ref }} --max-diagnostics=40
          else
            echo "⚠️ Base branch ${{ inputs.base-ref }} not found, running all projects instead"
            pnpm nx run-many --target=biome-check --max-diagnostics=40
          fi
        else
          pnpm nx run-many --target=biome-check --max-diagnostics=40
        fi
        echo "✅ Biome check passed"
      shell: bash

    - name: Node.js Tests
      run: |
        echo "🧪 Running Node.js tests..."
        if [ "${{ inputs.strategy }}" = "affected" ]; then
          # Verificar se a branch base existe antes de usar affected
          if git rev-parse --verify ${{ inputs.base-ref }} >/dev/null 2>&1; then
            pnpm nx affected --target=test --base=${{ inputs.base-ref }}
          else
            echo "⚠️ Base branch ${{ inputs.base-ref }} not found, running all projects instead"
            pnpm nx run-many --target=test --all
          fi
        else
          pnpm nx run-many --target=test --all
        fi
        echo "✅ Node.js tests passed"
      shell: bash
