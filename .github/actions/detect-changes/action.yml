name: 'Detect Changes'
description: 'Detect changes by language with support for manual overrides'

inputs:
  base-ref:
    description: 'Base reference for comparison'
    required: false
    default: 'HEAD~1'
  output-format:
    description: 'Output format (github, json, env)'
    required: false
    default: 'github'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'

outputs:
  go-changed:
    description: 'Whether Go files have changed'
    value: ${{ steps.detect.outputs.go-changed }}
  node-changed:
    description: 'Whether Node.js files have changed'
    value: ${{ steps.detect.outputs.node-changed }}
  config-changed:
    description: 'Whether configuration files have changed'
    value: ${{ steps.detect.outputs.config-changed }}
  skip-ci:
    description: 'Whether to skip CI completely'
    value: ${{ steps.detect.outputs.skip-ci }}
  affected-projects:
    description: 'List of affected projects'
    value: ${{ steps.detect.outputs.affected-projects }}

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Make Scripts Executable
      run: |
        find ./scripts -name "*.sh" -type f -exec chmod +x {} \;
        echo "✅ Script permissions fixed"
      shell: bash

    - name: Detect Language Changes
      id: detect
      run: |
        echo "🔍 Detecting changes by language..."
        
        # Executar script de detecção
        ./scripts/utils/detect-language-changes.sh \
          "${{ inputs.base-ref }}" \
          "${{ inputs.output-format }}" \
          "${{ inputs.verbose }}"
        
        # Capturar outputs para uso posterior
        echo "go-changed=$(./scripts/utils/detect-language-changes.sh "${{ inputs.base-ref }}" github | grep "go-changed=" | cut -d'=' -f2)" >> $GITHUB_OUTPUT
        echo "node-changed=$(./scripts/utils/detect-language-changes.sh "${{ inputs.base-ref }}" github | grep "node-changed=" | cut -d'=' -f2)" >> $GITHUB_OUTPUT
        echo "config-changed=$(./scripts/utils/detect-language-changes.sh "${{ inputs.base-ref }}" github | grep "config-changed=" | cut -d'=' -f2)" >> $GITHUB_OUTPUT
        echo "skip-ci=$(./scripts/utils/detect-language-changes.sh "${{ inputs.base-ref }}" github | grep "skip-ci=" | cut -d'=' -f2)" >> $GITHUB_OUTPUT
        echo "affected-projects=$(./scripts/utils/detect-language-changes.sh "${{ inputs.base-ref }}" github | grep "affected-projects=" | cut -d'=' -f2)" >> $GITHUB_OUTPUT
      shell: bash

    - name: Log Detection Results
      run: |
        echo "📊 Detection Results:"
        echo "  Go changed: ${{ steps.detect.outputs.go-changed }}"
        echo "  Node.js changed: ${{ steps.detect.outputs.node-changed }}"
        echo "  Config changed: ${{ steps.detect.outputs.config-changed }}"
        echo "  Skip CI: ${{ steps.detect.outputs.skip-ci }}"
        echo "  Affected projects: ${{ steps.detect.outputs.affected-projects }}"
      shell: bash
