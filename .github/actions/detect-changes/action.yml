name: 'Detect Changes'
description: 'Detect changes by language and affected projects with support for manual overrides'

inputs:
  base-ref:
    description: 'Base reference for comparison'
    required: false
    default: 'HEAD~1'
  output-format:
    description: 'Output format (github, json, env)'
    required: false
    default: 'github'
  verbose:
    description: 'Enable verbose output'
    required: false
    default: 'false'

outputs:
  go-changed:
    description: 'Whether Go files have changed'
    value: ${{ steps.detect.outputs.go-changed }}
  node-changed:
    description: 'Whether Node.js files have changed'
    value: ${{ steps.detect.outputs.node-changed }}
  config-changed:
    description: 'Whether configuration files have changed'
    value: ${{ steps.detect.outputs.config-changed }}
  skip-ci:
    description: 'Whether to skip CI completely'
    value: ${{ steps.detect.outputs.skip-ci }}
  affected-projects:
    description: 'List of affected projects'
    value: ${{ steps.detect.outputs.affected-projects }}

runs:
  using: 'composite'
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Make Scripts Executable
      run: |
        find ./scripts -name "*.sh" -type f -exec chmod +x {} \;
        echo "✅ Script permissions fixed"
      shell: bash

    - name: Detect Language Changes
      id: detect
      run: |
        echo "🔍 Detecting changes by language..."
        
        # Executar script unificado UMA VEZ e capturar output completo
        DETECTION_OUTPUT=$(./scripts/utils/detect-changed-projects.sh \
          "" \
          "${{ inputs.base-ref }}" \
          "${{ inputs.output-format }}")
        
        # Parsear e exportar cada variável
        echo "$DETECTION_OUTPUT" | while IFS='=' read -r key value; do
          echo "$key=$value" >> $GITHUB_OUTPUT
        done
        
        # Log do output completo para debug
        echo "$DETECTION_OUTPUT"
      shell: bash

    - name: Log Detection Results
      run: |
        echo "📊 Detection Results:"
        echo "  Go changed: ${{ steps.detect.outputs.go-changed }}"
        echo "  Node.js changed: ${{ steps.detect.outputs.node-changed }}"
        echo "  Config changed: ${{ steps.detect.outputs.config-changed }}"
        echo "  Skip CI: ${{ steps.detect.outputs.skip-ci }}"
        echo "  Affected projects: ${{ steps.detect.outputs.affected-projects }}"
      shell: bash
